name: fSnippetCli
options:
  bundleIdPrefix: kr.finfra
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: BZDZFZWF6K
    PRODUCT_NAME: fSnippetCli

targets:
  fSnippetCli:
    type: application
    platform: macOS
    sources:
      - path: fSnippetCli
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.finfra.fSnippetCli
        INFOPLIST_FILE: fSnippetCli/Info.plist
        CODE_SIGN_ENTITLEMENTS: fSnippetCli/fSnippetCli.entitlements
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: true
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
    entitlements:
      path: fSnippetCli/fSnippetCli.entitlements
    scheme:
      testTargets:
        - fSnippetTests
        - fSnippetCliTests

  fSnippetTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: fSnippetTests
    dependencies:
      - target: fSnippetCli
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.finfra.fSnippetTests
        PRODUCT_NAME: fSnippetTests
        GENERATE_INFOPLIST_FILE: true
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/fSnippetCli.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/fSnippetCli"

  fSnippetCliTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: fSnippetCliTests
    dependencies:
      - target: fSnippetCli
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.finfra.fSnippetCliTests
        PRODUCT_NAME: fSnippetCliTests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_IDENTITY: ""
